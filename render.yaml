services:
  - type: web
    name: repomind-backend
    env: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn backend.api:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

      - key: GITHUB_TOKEN
        sync: false

      - key: GROQ_API_KEY
        sync: false